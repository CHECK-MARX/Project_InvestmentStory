name: dotnet-ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore InvestmentStory.sln

      - name: Build
        run: dotnet build InvestmentStory.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test InvestmentStory.sln --configuration Release --no-build --verbosity normal
